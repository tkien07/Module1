    <style>
        table {
            border-collapse: collapse;

        .board {
            background-color: orange;
            padding: 20px;
            width: 500px;
            
        }

        th {
            width: 40px;
            height: 40px;
            text-align: center;
            font-weight: bold;
        }

        td {
            width: 50px;
            height: 50px;
        }
        /* td:nth-child:(odd) xen kẻ lẻ */
        tr td:nth-child(odd) {
            background-color: #ddd;
        }
        /* td:nth-child:(odd) xen kẻ chẵn */
        tr td:nth-child(even) {
            background-color: black;
        }

        /* Đảo màu hàng chẵn */
        tr:nth-child(even) td:nth-child(odd) {
            background-color: black;
        }

        tr:nth-child(even) td:nth-child(even) {
            background-color: #ddd;
        }
    </style>
</head>
