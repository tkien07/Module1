<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            text-align: center;
            color: blue;
        }

        table {
            border-collapse: collapse;
        }

        .thu {
            display: flex;
            width: fit-content;
            border: 2px solid white;
            margin: auto;
        }

        .day {
            padding: 15px 25px;
            color: white;
            font-weight: bold;
            text-align: center;
            border-right: 2px solid rgb(255, 253, 253);
        }

        .cn {
            background-color: red;
        }

        .cv {
            background-color: orange;
        }

        .tbay {
            background-color: blue;
        }

        .thungay {
            display: flex;
            width: fit-content;
            margin: auto;
            border: 2px solid white;

        }

        .ngay {
            padding: 15px 25px;
            color: rgb(14, 13, 13);
            font-weight: bold;
            text-align: center;
            border-right: 2px solid rgb(255, 253, 253);
        }

        .sun {
            color: red;
        }

        .thuong {
            color: black;
        }

        .sat {
            color: blue;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .row {
            display: flex;
        }

        .day,
        .ngay {
            width: 100px;
            text-align: center;
            padding: 10px;
        }

        table {
            border-collapse: collapse;
            margin: auto;

            padding: 20px;
            width: 500px;
        }

        .calendai {
            border-collapse: collapse;
            background-color: white;
            border: 3px solid #6e6d6d;


        }

        body {
            
        }
        .calendar th,
        .calendar td {
            border: none;
            width: 60px;
            height: 50px;
            text-align: center;
            vertical-align: middle;
            font-size: 18px;
            position: relative;
        }
    </style>
</head>

<body>

</body>

</html>
