<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablesimple</title>
    <style>
        th,
        td {
            padding: 8px;
            border: 1px solid #dddddd;
        }

        tr:nth-child(even) {
            background-color: #a8a6a6;
        }

        

        table {
            border-collapse: collapse;
            width: 100%;
            font-family: arial, sans-serif"

        }
    </style>
</head>
